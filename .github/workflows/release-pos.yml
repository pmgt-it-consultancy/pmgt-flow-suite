name: Release POS Android

on:
  push:
    branches:
      - staging
      - main
    paths:
      - '.github/workflows/**'
      - 'apps/native/**'
      - 'packages/backend/**'
      - 'pnpm-lock.yaml'

concurrency:
  group: release-pos-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ github.ref_name == 'main' && 'Production' || 'Staging' }} APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set build variant
        id: variant
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "name=production" >> $GITHUB_OUTPUT
            echo "profile=production" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "name=staging" >> $GITHUB_OUTPUT
            echo "profile=staging" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./apps/native/package.json').version")" >> $GITHUB_OUTPUT

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store/v3
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('apps/native/android/**/*.gradle*', 'apps/native/android/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: 16.3.0
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write .env file
        working-directory: apps/native
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "APP_VARIANT=production" > .env
            echo "EXPO_PUBLIC_CONVEX_URL=${{ secrets.CONVEX_URL_PRODUCTION }}" >> .env
          else
            echo "APP_VARIANT=staging" > .env
            echo "EXPO_PUBLIC_CONVEX_URL=${{ secrets.CONVEX_URL_STAGING }}" >> .env
          fi

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ runner.temp }}/release.keystore

      - name: Write credentials.json
        working-directory: apps/native
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          printf '{"android":{"keystore":{"keystorePath":"%s","keystorePassword":"%s","keyAlias":"%s","keyPassword":"%s"}}}' \
            "$KEYSTORE_PATH" "$KEYSTORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD" > credentials.json

      - name: Prebuild Android
        working-directory: apps/native
        env:
          APP_VARIANT: ${{ steps.variant.outputs.name }}
        run: npx expo prebuild --platform android --clean

      - name: Build with EAS
        working-directory: apps/native
        run: |
          eas build --profile ${{ steps.variant.outputs.profile }} --platform android --non-interactive --local --output ../../pmgt-flow-${{ steps.variant.outputs.name }}-${{ steps.version.outputs.version }}.apk

      - name: Read release notes
        id: notes
        run: |
          if [ -f "apps/native/release_notes.txt" ]; then
            {
              echo "body<<EOF"
              cat apps/native/release_notes.txt
              echo ""
              echo "EOF"
            } >> $GITHUB_OUTPUT
          else
            echo "body=Release ${{ steps.version.outputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ steps.variant.outputs.name }}
          name: v${{ steps.version.outputs.version }} (${{ steps.variant.outputs.name }})
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: ${{ steps.variant.outputs.prerelease }}
          files: pmgt-flow-${{ steps.variant.outputs.name }}-${{ steps.version.outputs.version }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pos-${{ steps.variant.outputs.name }}-${{ github.sha }}
          path: pmgt-flow-${{ steps.variant.outputs.name }}-${{ steps.version.outputs.version }}.apk
          retention-days: 30
