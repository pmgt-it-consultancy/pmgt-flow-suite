name: Release POS Android

on:
  push:
    branches:
      - staging
      - main
    paths:
      - 'apps/native/**'
      - 'packages/backend/**'
      - 'pnpm-lock.yaml'

concurrency:
  group: release-pos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ github.ref_name == 'main' && 'Production' || 'Staging' }} APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set build flavor
        id: flavor
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "name=production" >> $GITHUB_OUTPUT
            echo "task=assembleProductionRelease" >> $GITHUB_OUTPUT
            echo "convex_url=${{ secrets.CONVEX_URL_PRODUCTION }}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "name=staging" >> $GITHUB_OUTPUT
            echo "task=assembleStagingRelease" >> $GITHUB_OUTPUT
            echo "convex_url=${{ secrets.CONVEX_URL_STAGING }}" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./apps/native/package.json').version")" >> $GITHUB_OUTPUT

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apps/native/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Write .env file
        working-directory: apps/native
        run: echo "EXPO_PUBLIC_CONVEX_URL=${{ steps.flavor.outputs.convex_url }}" > .env

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ runner.temp }}/release.keystore

      - name: Build APK
        working-directory: apps/native/android
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew ${{ steps.flavor.outputs.task }} --no-daemon

      - name: Rename APK
        run: |
          APK_PATH=$(find apps/native/android/app/build/outputs/apk/${{ steps.flavor.outputs.name }}/release -name '*.apk' | head -1)
          cp "$APK_PATH" "pmgt-flow-${{ steps.flavor.outputs.name }}-${{ steps.version.outputs.version }}.apk"

      - name: Read release notes
        id: notes
        run: |
          if [ -f "apps/native/release_notes.txt" ]; then
            {
              echo "body<<EOF"
              cat apps/native/release_notes.txt
              echo ""
              echo "EOF"
            } >> $GITHUB_OUTPUT
          else
            echo "body=Release ${{ steps.version.outputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ steps.flavor.outputs.name }}
          name: v${{ steps.version.outputs.version }} (${{ steps.flavor.outputs.name }})
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: ${{ steps.flavor.outputs.prerelease }}
          files: pmgt-flow-${{ steps.flavor.outputs.name }}-${{ steps.version.outputs.version }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pos-${{ steps.flavor.outputs.name }}-${{ github.sha }}
          path: pmgt-flow-${{ steps.flavor.outputs.name }}-${{ steps.version.outputs.version }}.apk
          retention-days: 30
