name: Release POS Android

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-pos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.flavor }} APK
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - flavor: staging
            task: assembleStagingRelease
            convex_url_secret: CONVEX_URL_STAGING
          - flavor: production
            task: assembleProductionRelease
            convex_url_secret: CONVEX_URL_PRODUCTION

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apps/native/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Write .env file
        working-directory: apps/native
        run: echo "EXPO_PUBLIC_CONVEX_URL=${{ secrets[matrix.convex_url_secret] }}" > .env

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ runner.temp }}/release.keystore

      - name: Build APK
        working-directory: apps/native/android
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew ${{ matrix.task }} --no-daemon

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          APK_PATH=$(find apps/native/android/app/build/outputs/apk/${{ matrix.flavor }}/release -name '*.apk' | head -1)
          cp "$APK_PATH" "pmgt-flow-${{ matrix.flavor }}-${{ steps.version.outputs.version }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.flavor }}
          path: pmgt-flow-${{ matrix.flavor }}-${{ steps.version.outputs.version }}.apk

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download staging APK
        uses: actions/download-artifact@v4
        with:
          name: apk-staging

      - name: Download production APK
        uses: actions/download-artifact@v4
        with:
          name: apk-production

      - name: Read release notes
        id: notes
        run: |
          if [ -f "apps/native/release_notes.txt" ]; then
            {
              echo "body<<EOF"
              cat apps/native/release_notes.txt
              echo ""
              echo "EOF"
            } >> $GITHUB_OUTPUT
          else
            echo "body=Release ${{ steps.version.outputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          files: |
            pmgt-flow-staging-${{ steps.version.outputs.version }}.apk
            pmgt-flow-production-${{ steps.version.outputs.version }}.apk
