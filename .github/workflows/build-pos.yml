name: Build POS Android

on:
  push:
    branches:
      - staging
      - main
    paths:
      - 'apps/native/**'
      - 'packages/backend/**'
      - 'pnpm-lock.yaml'

concurrency:
  group: build-pos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ github.ref_name == 'main' && 'Production' || 'Staging' }} APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apps/native/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Set build flavor
        id: flavor
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "name=production" >> $GITHUB_OUTPUT
            echo "task=assembleProductionRelease" >> $GITHUB_OUTPUT
            echo "convex_url=${{ secrets.CONVEX_URL_PRODUCTION }}" >> $GITHUB_OUTPUT
          else
            echo "name=staging" >> $GITHUB_OUTPUT
            echo "task=assembleStagingRelease" >> $GITHUB_OUTPUT
            echo "convex_url=${{ secrets.CONVEX_URL_STAGING }}" >> $GITHUB_OUTPUT
          fi

      - name: Write .env file
        working-directory: apps/native
        run: echo "EXPO_PUBLIC_CONVEX_URL=${{ steps.flavor.outputs.convex_url }}" > .env

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ runner.temp }}/release.keystore

      - name: Build APK
        working-directory: apps/native/android
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew ${{ steps.flavor.outputs.task }} --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pos-${{ steps.flavor.outputs.name }}-${{ github.sha }}
          path: apps/native/android/app/build/outputs/apk/${{ steps.flavor.outputs.name }}/release/*.apk
          retention-days: 30
